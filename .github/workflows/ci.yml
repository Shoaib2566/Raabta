name: Raabta Backend CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install backend dependencies
        working-directory: ./V1/backend
        run: npm install

      - name: Run backend tests
        working-directory: ./V1/backend
        run: npm test

  build-docker:
    name: Build and Test Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: ./V1/backend
        run: docker build -t raabta-backend:v1 .

      - name: Run Docker container
        run: docker run -d -p 5000:5000 --name raabta-backend-container raabta-backend:v1

      - name: Wait for backend to start
        run: sleep 5

      - name: Test health endpoint inside Docker
        run: curl -f http://localhost:5000/health

      - name: Show Docker logs
        if: always()
        run: docker logs raabta-backend-container || true

      - name: Stop Docker container
        if: always()
        run: docker stop raabta-backend-container || true